# ===========================
# Server
# ===========================
#server.port=8080
server.port=${PORT:8080}
server.address=0.0.0.0

# ===========================
# H2 Database Configuration
# ===========================
#spring.datasource.url=jdbc:h2:mem:threadregistrydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / Hibernate
# ===========================
#spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensure data.sql loads AFTER schema creation
spring.jpa.defer-datasource-initialization=true

# ===========================
# Thymeleaf
# ===========================
spring.thymeleaf.cache=false

# Auto-update
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
spring.devtools.restart.additional-paths=src/main/resources/templates,src/main/resources/static

# Disable heavy startup features
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=false

# If you are using H2, ensure it's in-memory for speed
spring.datasource.url=jdbc:h2:mem:testdb