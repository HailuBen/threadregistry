<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{fragments/header :: header-assets}"></th:block>
    <title>Admin Dashboard | threadregistry</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar-content}"></div>

<div class="container mt-5">
    <div class="admin-header border-bottom mb-4 d-flex justify-content-between align-items-end">
        <div>
            <h1 class="text-danger">System Administration</h1>
            <p class="text-muted">Logged in as: <span sec:authentication="name" class="fw-bold">Admin</span></p>
        </div>
        <div class="mb-3">
            <span class="badge bg-dark">v2.0 Stable</span>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card bg-dark text-white shadow mb-4">
                <div class="card-body text-center">
                    <h3>Inventory</h3>
                    <p class="display-6" th:text="${productCount}">0</p>
                    <a th:href="@{/products}" class="btn btn-sm btn-outline-light">Manage Products</a>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header bg-dark text-white">
                    <i class="bi bi-lightning-fill"></i> Quick Actions
                </div>
                <div class="card-body">
                    <div class="list-group list-group-flush">
                        <a th:href="@{/products/new}" class="list-group-item list-group-item-action border-0 px-0">
                            <i class="bi bi-plus-circle-fill text-danger me-2"></i> Add New Product
                        </a>
                        <a th:href="@{/home}" class="list-group-item list-group-item-action border-0 px-0">
                            <i class="bi bi-eye-fill text-primary me-2"></i> View Storefront
                        </a>
                        <a th:href="@{/h2-console}" target="_blank"
                           class="list-group-item list-group-item-action border-0 px-0">
                            <i class="bi bi-database-fill text-warning me-2"></i> Database Console
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8 mb-4">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white">
                    <i class="bi bi-people-fill"></i> Registered Users & Roles
                </div>
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user : ${allUsers}">
                            <td th:text="${user.username}">User</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${user.role == 'ADMIN' ? 'bg-danger' : 'bg-info'}"
                                      th:text="${user.role}">ROLE</span>
                            </td>
                            <td class="text-end">
                                <div class="btn-group">
                                    <form th:action="@{/admin/users/promote/{id}(id=${user.id})}" method="post"
                                          class="d-inline">

                                        <button type="submit" class="btn btn-sm btn-warning"
                                                th:if="${user.role == 'USER' || user.role == 'ROLE_USER'}">
                                            Promote
                                        </button>
                                    </form>

                                    <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post"
                                          class="d-inline ms-1">
                                        <button type="submit" class="btn btn-sm btn-danger"
                                                onclick="return confirm('Are you sure?')">Delete
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
