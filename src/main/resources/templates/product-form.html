<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">
    <h2>Add a New Product</h2>

    <form th:action="@{/products}" th:object="${product}" method="post" class="mt-4">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input th:field="*{name}" class="form-control">
            <div class="text-danger" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-select">
                <option value="">Select category</option>
                <option value="Shoes">Shoes</option>
                <option value="Outerwear">Outerwear</option>
                <option value="Tops">Tops</option>
                <option value="Accessories">Accessories</option>
            </select>
            <div class="text-danger" th:errors="*{category}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select th:field="*{gender}" class="form-select">
                <option value="">Select gender</option>
                <option value="Men">Men</option>
                <option value="Women">Women</option>
                <option value="Unisex">Unisex</option>
            </select>
            <div class="text-danger" th:errors="*{gender}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Brand</label>
            <select th:field="*{brandId}" class="form-select">
                <option value="">Select brand</option>
                <option th:each="b : ${brands}"
                        th:value="${b.brandId}"
                        th:text="${b.name}">
                </option>
            </select>
            <div class="text-danger" th:errors="*{brandId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control"></textarea>
        </div>

        <button class="btn btn-primary">Save Product</button>
    </form>
</div>

</body>
</html>
