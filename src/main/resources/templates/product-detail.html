<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header-assets}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">

    <div class="row align-items-start">

        <div class="col-md-5 mb-4">
            <img th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 class="img-fluid rounded shadow-sm border"
                 style="max-width: 100%; height: auto;">
        </div>

        <div class="col-md-7">

            <h2 class="mb-1 text-uppercase fw-bold" th:text="${product.name}"></h2>
            <h4 class="text-muted mb-4" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></h4>

            <hr>

            <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
            <p><strong>Condition:</strong> <span class="badge bg-dark" th:text="${product.condition}"></span></p>

            <p class="mt-3"><strong>Description:</strong></p>
            <p class="lead" th:text="${product.description}"></p>

            <div class="card bg-light border-0 rounded-0 mt-4">
                <div class="card-body">
                    <p class="mb-0">
                        <strong>Brand:</strong>
                        <span th:text="${brand.name}"></span>
                        <small class="text-muted">(Origin: <span th:text="${brand.country}"></span>)</small>
                    </p>
                </div>
            </div>

            <p class="mt-4 small text-muted">
                <strong>Listed on:</strong>
                <span th:text="${#temporals.format(product.createdAt, 'MMMM dd, yyyy - HH:mm')}"></span>
            </p>

            <div class="mt-5">
                <a href="/products" class="btn btn-outline-dark rounded-0">Back to Collection</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
