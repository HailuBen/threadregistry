<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">
    <h2 th:text="${product.name}"></h2>

    <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
    <p><strong>Gender:</strong> <span th:text="${product.gender}"></span></p>
    <p><strong>Description:</strong> <span th:text="${product.description}"></span></p>
    <p>
        <strong>Brand:</strong>
        <span th:text="${brand.name}"></span>
        (ID: <span th:text="${brand.brandId}"></span>)
    </p>
    <p><strong>Created At:</strong> <span th:text="${product.createdAt}"></span></p>

    <a href="/products" class="btn btn-secondary mt-3">Back to Products</a>
</div>

</body>
</html>
