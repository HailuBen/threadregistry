<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">

    <div class="row align-items-start">

        <!-- LEFT COLUMN: PRODUCT IMAGE -->
        <div class="col-md-5 mb-4">
            <img th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 class="img-fluid rounded shadow-sm border"
                 style="max-width: 100%; height: auto;">
        </div>

        <!-- RIGHT COLUMN: PRODUCT INFORMATION -->
        <div class="col-md-7">

            <h2 class="mb-3" th:text="${product.name}"></h2>

            <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
            <p><strong>Gender:</strong> <span th:text="${product.gender}"></span></p>

            <p class="mt-3"><strong>Description:</strong></p>
            <p th:text="${product.description}"></p>

            <p class="mt-3">
                <strong>Brand:</strong>
                <span th:text="${brand.name}"></span>
                (ID: <span th:text="${brand.brandId}"></span>)
            </p>

            <p><strong>Created At:</strong> <span th:text="${product.createdAt}"></span></p>

            <a href="/products" class="btn btn-secondary mt-4">Back to Products</a>

        </div>

    </div>

</div>

</body>
</html>
