<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>threadregistry – Home</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-4">

    <div class="category-bar d-flex justify-content-between align-items-center p-3 mb-4 shadow-sm">
        <span class="category-item">Products</span>
        <span class="category-item">Brands</span>
        <span class="category-item">Accessories</span>
        <span class="category-item">Sale</span>
        <span class="category-item">Clearance</span>
    </div>

    <div id="featuredCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="/images/featured-white-shirt.jpg" class="d-block w-100 featured-img">
            </div>

            <div class="carousel-item">
                <img src="/images/featured-black-shirt.jpg" class="d-block w-100 featured-img">
            </div>

            <div class="carousel-item">
                <img src="/images/featured-gucci-shoes.jpg" class="d-block w-100 featured-img">
            </div>

        </div>

        <button class="carousel-control-prev" type="button" data-bs-target="#featuredCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#featuredCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <div class="row g-4">
        <div class="col-md-3"><div class="item-box"><img src="/images/item1.jpg" class="item-img"></div></div>
        <div class="col-md-3"><div class="item-box"><img src="/images/item2.png" class="item-img"></div></div>
        <div class="col-md-3"><div class="item-box"><img src="/images/item3.jpg" class="item-img"></div></div>
        <div class="col-md-3"><div class="item-box"><img src="/images/item4.jpg" class="item-img"></div></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
