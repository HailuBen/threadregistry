<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: body"></div>

<div class="container mt-5">

    <h2 class="mb-4">Products</h2>

    <!-- FILTERS + SORTING -->
    <form method="get" class="row g-3 mb-4">

        <!-- Category Filter -->
        <div class="col-md-3">
            <select name="category" class="form-select">
                <option value="">All Categories</option>
                <option value="Shoes" th:selected="${category == 'Shoes'}">Shoes</option>
                <option value="Outerwear" th:selected="${category == 'Outerwear'}">Outerwear</option>
                <option value="Tops" th:selected="${category == 'Tops'}">Tops</option>
                <option value="Accessories" th:selected="${category == 'Accessories'}">Accessories</option>
            </select>
        </div>

        <!-- Gender Filter -->
        <div class="col-md-3">
            <select name="gender" class="form-select">
                <option value="">All Genders</option>
                <option value="Men" th:selected="${gender == 'Men'}">Men</option>
                <option value="Women" th:selected="${gender == 'Women'}">Women</option>
                <option value="Unisex" th:selected="${gender == 'Unisex'}">Unisex</option>
            </select>
        </div>

        <!-- Sorting -->
        <div class="col-md-3">
            <select name="sortBy" class="form-select">
                <option value="name" th:selected="${sortBy == 'name'}">Sort by Name</option>
                <option value="category" th:selected="${sortBy == 'category'}">Sort by Category</option>
                <option value="gender" th:selected="${sortBy == 'gender'}">Sort by Gender</option>
                <option value="brandId" th:selected="${sortBy == 'brandId'}">Sort by Brand</option>
            </select>
        </div>

        <!-- Apply Button -->
        <div class="col-md-3">
            <button class="btn btn-primary w-100">Apply</button>
        </div>

    </form>

    <!-- PRODUCT GRID -->
    <div class="row">
        <div class="col-md-4 mb-4" th:each="p : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${p.name}"></h5>
                    <p class="card-text">
                        Category: <span th:text="${p.category}"></span><br>
                        Gender: <span th:text="${p.gender}"></span><br>
                        Brand ID: <span th:text="${p.brandId}"></span>
                    </p>
                    <a th:href="@{'/products/' + ${p.productId}}" class="btn btn-outline-primary">View</a>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-center mt-4">
        <nav>
            <ul class="pagination">

                <!-- Previous -->
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{|/products?page=${products.number - 1}&sortBy=${sortBy}&category=${category}&gender=${gender}|}">
                        Previous
                    </a>
                </li>

                <!-- Page Numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:classappend="${i == products.number} ? 'active'">
                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{|/products?page=${i}&sortBy=${sortBy}&category=${category}&gender=${gender}|}">
                    </a>
                </li>

                <!-- Next -->
                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{|/products?page=${products.number + 1}&sortBy=${sortBy}&category=${category}&gender=${gender}|}">
                        Next
                    </a>
                </li>

            </ul>
        </nav>
    </div>

</div>

</body>
</html>
