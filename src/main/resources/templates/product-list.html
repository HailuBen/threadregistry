<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header-assets}"></head>
<body>
<div th:replace="~{fragments/navbar :: body}"></div>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <h5 class="text-uppercase fw-bold mb-4">Filters</h5>
            <form th:action="@{/products}" method="get">
                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Category</label>
                    <select name="category" class="form-select rounded-0" onchange="this.form.submit()">
                        <option value="">All Categories</option>
                        <option value="Shoes" th:selected="${category == 'Shoes'}">Shoes</option>
                        <option value="Outerwear" th:selected="${category == 'Outerwear'}">Outerwear</option>
                        <option value="Bottoms" th:selected="${category == 'Bottoms'}">Bottoms</option>
                        <option value="Accessories" th:selected="${category == 'Accessories'}">Accessories</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold text-muted text-uppercase">Brand</label>
                    <select name="brandId" class="form-select rounded-0" onchange="this.form.submit()">
                        <option value="">All Brands</option>
                        <option th:each="b : ${brands}"
                                th:value="${b.brandId}"
                                th:text="${b.name}"
                                th:selected="${b.brandId == brandId}">Brand</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <div>
                    <h3 class="fw-light text-uppercase tracking-widest mb-0">Catalog</h3>
                    <span class="text-muted small" th:text="${products.size()} + ' Items found'">0 Items</span>
                </div>

                <div class="d-flex align-items-center">
                    <label class="small fw-bold text-uppercase me-2" style="color: var(--text-dark);">
                        Sort By:
                    </label>

                    <form th:action="@{/products}" method="get" class="d-inline">
                        <input type="hidden" name="category" th:value="${category}">
                        <input type="hidden" name="brandId" th:value="${brandId}">

                        <select name="sortBy" class="form-select form-select-sm rounded-0 border-0 form-control"
                                style="width: auto; display: inline-block;"
                                onchange="this.form.submit()">
                            <option value="name" th:selected="${sortBy == 'name'}">Name (A-Z)</option>
                            <option value="price" th:selected="${sortBy == 'price'}">Price (Low to High)</option>
                            <option value="priceDesc" th:selected="${sortBy == 'priceDesc'}">Price (High to Low)</option>
                            <option value="createdAt" th:selected="${sortBy == 'createdAt'}">Newest Arrivals</option>
                        </select>
                    </form>
                </div>            </div>

            <div class="row g-4">
                <div class="col-6 col-lg-4" th:each="p : ${products}">
                    <div class="product-card">
                        <a th:href="@{/products/{id}(id=${p.id})}" class="text-decoration-none">
                            <div class="item-box position-relative">
                                <img th:src="${p.imageUrl}" class="item-img" th:alt="${p.name}">
                                <span class="badge bg-dark position-absolute top-0 end-0 m-2" th:text="${p.condition}">NEW</span>
                            </div>
                            <div class="product-details mt-3 text-dark">
                                <h6 class="brand-label text-uppercase fw-bold mb-0" th:text="${p.brandName}">BRAND</h6>
                                <p class="product-label text-muted mb-1" th:text="${p.name}">Name</p>
                                <p class="price-label fw-bold" th:text="'$' + ${#numbers.formatDecimal(p.price, 1, 2)}">$0.00</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
                <p class="text-muted">No products found matching these filters.</p>
                <a th:href="@{/products}" class="btn btn-outline-dark btn-sm">Clear All Filters</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
